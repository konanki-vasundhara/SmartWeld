version: '3'

services:

  frontend:
    build: ./src

    ports:
      - "3000:3000"

    depends_on:
      - backend

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:vassu@db:5432/Smart_Weld

    depends_on:
      - db

  db:
    image: postgres:15

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: Smart_Weld

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
