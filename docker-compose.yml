services:

  postgres:
    image: postgres:15
    container_name: smartweld-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: smartweld
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartweld-net
    # ❌ REMOVE PORT MAPPING (IMPORTANT FIX)
    # ports:
    #   - "5432:5432"

  backend:
    build: ./backend
    container_name: smartweld-backend
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: vassu
      DB_NAME: smartweld
      DB_PORT: 5432
    ports:
      - "5000:5000"
    networks:
      - smartweld-net

  frontend:
    build: .
    container_name: smartweld-frontend
    restart: always
    networks:
      - smartweld-net

  nginx:
    image: nginx:alpine
    container_name: smartweld-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - smartweld-net

volumes:
  postgres_data:

networks:
  smartweld-net:
    driver: bridge
