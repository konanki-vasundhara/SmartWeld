version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: smartweld
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: backend
    environment:
      PORT: 5000
    expose:
      - "5000"
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "3000"
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-net

networks:
  app-net:
