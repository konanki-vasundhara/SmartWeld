services:

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: Smart_Weld
    ports:
      - "5433:5432"   # FIXED PORT CONFLICT
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  frontend:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
