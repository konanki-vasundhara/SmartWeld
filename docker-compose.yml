version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: smartweld-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Smart_Weld
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: smartweld-backend
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env

  frontend:
    build: .
    container_name: smartweld-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
