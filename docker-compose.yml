version: '3'

services:

  frontend:
    build: ./src
    container_name: smartweld-frontend

    ports:
      - "3001:3000"

    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: smartweld-backend

    ports:
      - "8001:8000"

    environment:
      DATABASE_URL: postgresql://postgres:vassu@db:5432/Smart_Weld

    depends_on:
      - db

  db:
    image: postgres:15
    container_name: smartweld-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: Smart_Weld

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
