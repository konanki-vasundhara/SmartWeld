version: "3.8"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vassu
      POSTGRES_DB: smartweld
    ports:
      - "5432:5432"
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=vassu
      - DB_NAME=smartweld
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: .
    ports:
      - "3000:80"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always
